name: CI

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  OMNIVOICE_MODEL_REPO: k2-fsa/OmniVoice
  OMNIVOICE_WHISPER_REPO: oxide-lab/whisper-base-GGUF
  OMNIVOICE_FIXTURES_TAG: ci-fixtures-v1
  OMNIVOICE_FIXTURES_BASENAME: omnivoice-ci-fixtures-v1.tar.zst

jobs:
  linux-clippy:
    name: Linux Clippy
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  macos-metal:
    name: macOS Metal
    runs-on: macos-15
    env:
      OMNIVOICE_ROOT: ${{ github.workspace }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install CI Python dependencies
        run: python -m pip install --upgrade pip huggingface_hub zstandard

      - name: Download OmniVoice model bundle
        run: |
          python - <<'PY'
          import json
          import os
          import shutil
          from pathlib import Path

          from huggingface_hub import snapshot_download

          workspace = Path(os.environ["OMNIVOICE_ROOT"])
          model_root = workspace / "model"
          model_root.mkdir(parents=True, exist_ok=True)

          manifest_source = workspace / "crates" / "omnivoice-infer" / "assets" / "omnivoice.artifacts.json"
          manifest = json.loads(manifest_source.read_text(encoding="utf-8"))
          repo_id = os.environ["OMNIVOICE_MODEL_REPO"]

          allow_patterns = []
          seen = set()
          for relative in [
              manifest["generator"]["config"],
              manifest["generator"]["weights"],
              manifest["text_tokenizer"]["tokenizer"],
              manifest["text_tokenizer"]["tokenizer_config"],
              manifest["text_tokenizer"].get("metadata", {}).get("chat_template"),
              manifest["audio_tokenizer"]["config"],
              manifest["audio_tokenizer"]["weights"],
              manifest["audio_tokenizer"]["preprocessor_config"],
              manifest["audio_tokenizer"].get("metadata", {}).get("license"),
          ]:
              if not relative:
                  continue
              normalized = relative.replace("\\", "/")
              if normalized not in seen:
                  seen.add(normalized)
                  allow_patterns.append(normalized)

          token = os.environ["HF_TOKEN"]

          snapshot_download(
              repo_id=repo_id,
              repo_type="model",
              allow_patterns=allow_patterns,
              local_dir=model_root,
              token=token,
          )

          shutil.copy2(manifest_source, model_root / "omnivoice.artifacts.json")
          PY

      - name: Download Whisper ASR assets
        run: |
          python - <<'PY'
          import os
          import shutil
          from pathlib import Path

          from huggingface_hub import hf_hub_download, list_repo_files

          workspace = Path(os.environ["OMNIVOICE_ROOT"])
          whisper_root = workspace / "model" / "whisper"
          whisper_root.mkdir(parents=True, exist_ok=True)

          repo_id = os.environ["OMNIVOICE_WHISPER_REPO"]
          token = os.environ["HF_TOKEN"]
          repo_files = set(list_repo_files(repo_id=repo_id, repo_type="model", token=token))
          required_files = [
              "config.json",
              "tokenizer.json",
              "whisper-base-q4_0.gguf",
          ]

          for remote_path in required_files:
              if remote_path not in repo_files:
                  raise RuntimeError(f"Missing required Whisper Candle file: {remote_path}")
              cached = Path(
                  hf_hub_download(
                      repo_id=repo_id,
                      filename=remote_path,
                      repo_type="model",
                      token=token,
                  )
              )
              shutil.copy2(cached, whisper_root / Path(remote_path).name)
          PY

      - name: Download CI fixtures bundle
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p "$RUNNER_TEMP/omnivoice-fixtures"
          gh release download "$OMNIVOICE_FIXTURES_TAG" \
            --pattern "$OMNIVOICE_FIXTURES_BASENAME.part-*" \
            --pattern "${OMNIVOICE_FIXTURES_BASENAME%.tar.zst}.sha256" \
            --pattern "${OMNIVOICE_FIXTURES_BASENAME%.tar.zst}.contents.txt" \
            --dir "$RUNNER_TEMP/omnivoice-fixtures"

      - name: Reassemble CI fixtures bundle
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          fixtures_dir = Path(os.environ["RUNNER_TEMP"]) / "omnivoice-fixtures"
          basename = os.environ["OMNIVOICE_FIXTURES_BASENAME"]
          target = fixtures_dir / basename
          parts = sorted(fixtures_dir.glob(f"{basename}.part-*"))
          if not parts:
              raise RuntimeError("Missing split CI fixture assets")

          with target.open("wb") as output:
              for part in parts:
                  with part.open("rb") as source:
                      while True:
                          chunk = source.read(1024 * 1024)
                          if not chunk:
                              break
                          output.write(chunk)
          PY

      - name: Extract CI fixtures bundle
        run: |
          python - <<'PY'
          import os
          import tarfile
          from pathlib import Path

          import zstandard

          workspace = Path(os.environ["OMNIVOICE_ROOT"])
          asset_name = os.environ["OMNIVOICE_FIXTURES_BASENAME"]
          archive = Path(os.environ["RUNNER_TEMP"]) / "omnivoice-fixtures" / asset_name

          with archive.open("rb") as source:
              dctx = zstandard.ZstdDecompressor()
              with dctx.stream_reader(source) as reader:
                  with tarfile.open(fileobj=reader, mode="r|") as tar:
                      tar.extractall(path=workspace)
          PY

      - name: Validate downloaded inputs
        run: |
          required_files=(
            "$OMNIVOICE_ROOT/model/omnivoice.artifacts.json"
            "$OMNIVOICE_ROOT/model/model.safetensors"
            "$OMNIVOICE_ROOT/model/audio_tokenizer/model.safetensors"
            "$OMNIVOICE_ROOT/model/whisper/config.json"
            "$OMNIVOICE_ROOT/model/whisper/tokenizer.json"
            "$OMNIVOICE_ROOT/artifacts/python_reference/manifest.json"
            "$OMNIVOICE_ROOT/artifacts/python_reference_cpu_strict/manifest.json"
            "$OMNIVOICE_ROOT/artifacts/python_reference_stage0_deterministic/manifest.json"
            "$OMNIVOICE_ROOT/artifacts/python_reference_stage0_deterministic_cpu_strict/manifest.json"
            "$OMNIVOICE_ROOT/artifacts/python_reference_stage7_cuda_f32_dense/manifest.json"
            "$OMNIVOICE_ROOT/artifacts/live_oracles/clone_prompt.json"
            "$OMNIVOICE_ROOT/ref.wav"
          )

          for path in "${required_files[@]}"; do
            if [[ ! -f "$path" ]]; then
              echo "Missing required CI input: $path" >&2
              exit 1
            fi
          done

          shopt -s nullglob
          ggufs=("$OMNIVOICE_ROOT"/model/whisper/*.gguf)
          if (( ${#ggufs[@]} == 0 )); then
            echo "Missing Whisper GGUF weights in $OMNIVOICE_ROOT/model/whisper" >&2
            exit 1
          fi

      - name: Run clippy (metal)
        run: cargo clippy --workspace --all-targets --features metal -- -D warnings

      - name: Run omnivoice-infer tests (metal)
        run: cargo test -p omnivoice-infer --features metal -- --test-threads=1

      - name: Run omnivoice-cli tests (metal)
        run: cargo test -p omnivoice-cli --features metal -- --test-threads=1

      - name: Generate metal listening samples
        if: always()
        continue-on-error: true
        run: |
          python - <<'PY'
          import json
          import os
          import shutil
          import subprocess
          from pathlib import Path

          root = Path(os.environ["OMNIVOICE_ROOT"])
          samples_dir = Path(os.environ["RUNNER_TEMP"]) / "omnivoice-audio"
          reference_root = root / "artifacts" / "python_reference_stage7_cuda_f32_dense"
          samples_dir.mkdir(parents=True, exist_ok=True)

          cases = [
              ("det_auto_en_short", "metal-auto"),
              ("det_design_en_british", "metal-design"),
          ]
          manifest = []

          for case_id, prefix in cases:
              case_path = reference_root / case_id / "case.json"
              case = json.loads(case_path.read_text(encoding="utf-8"))
              output_path = samples_dir / f"{prefix}.wav"
              stdout_path = samples_dir / f"{prefix}.stdout.log"
              stderr_path = samples_dir / f"{prefix}.stderr.log"

              generation = case.get("generation", {})
              command = [
                  "cargo",
                  "run",
                  "-p",
                  "omnivoice-cli",
                  "--features",
                  "metal",
                  "--",
                  "infer",
                  "--model-dir",
                  str(root / "model"),
                  "--text",
                  case["text"],
                  "--output",
                  str(output_path),
                  "--device",
                  "metal",
                  "--dtype",
                  "f32",
                  "--seed",
                  "1234",
                  "--num-step",
                  str(generation.get("num_step", 32)),
                  "--guidance-scale",
                  str(generation.get("guidance_scale", 2.0)),
                  "--t-shift",
                  str(generation.get("t_shift", 0.1)),
                  "--layer-penalty-factor",
                  str(generation.get("layer_penalty_factor", 5.0)),
                  "--position-temperature",
                  str(generation.get("position_temperature", 0.0)),
                  "--class-temperature",
                  str(generation.get("class_temperature", 0.0)),
                  "--preprocess-prompt",
                  str(generation.get("preprocess_prompt", True)).lower(),
                  "--postprocess-output",
                  str(generation.get("postprocess_output", True)).lower(),
                  "--denoise",
                  str(generation.get("denoise", True)).lower(),
              ]

              if case.get("language"):
                  command.extend(["--language", case["language"]])
              if case.get("instruct"):
                  command.extend(["--instruct", case["instruct"]])

              result = subprocess.run(
                  command,
                  cwd=root,
                  capture_output=True,
                  text=True,
              )
              stdout_path.write_text(result.stdout, encoding="utf-8")
              stderr_path.write_text(result.stderr, encoding="utf-8")

              reference_wav = reference_root / case_id / "final.wav"
              reference_copy = samples_dir / f"{prefix}.reference.wav"
              shutil.copy2(reference_wav, reference_copy)
              (samples_dir / f"{prefix}.case.json").write_text(
                  json.dumps(case, indent=2, ensure_ascii=False) + "\n",
                  encoding="utf-8",
              )

              manifest.append(
                  {
                      "case_id": case_id,
                      "artifact_prefix": prefix,
                      "command": command,
                      "output": output_path.name,
                      "reference_output": reference_copy.name,
                      "stdout_log": stdout_path.name,
                      "stderr_log": stderr_path.name,
                      "exit_code": result.returncode,
                  }
              )

              if result.returncode != 0:
                  raise SystemExit(
                      f"sample generation failed for {case_id} with exit code {result.returncode}"
                  )

          (samples_dir / "manifest.json").write_text(
              json.dumps({"samples": manifest}, indent=2, ensure_ascii=False) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Upload metal listening samples
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: omnivoice-metal-samples
          path: ${{ runner.temp }}/omnivoice-audio
          if-no-files-found: warn
